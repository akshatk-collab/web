<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#050a14;--card:#0d1628;--card2:#0a1220;
  --accent:#00e5ff;--accent2:#8b5cf6;--accent3:#10b981;
  --text:#dde6f0;--muted:#5a7394;--border:#162845;
  --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);overflow-x:hidden;line-height:1.6}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
a{text-decoration:none;color:inherit}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:1000;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 6%;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);background:rgba(5,10,20,0.88);border-bottom:1px solid rgba(22,40,69,0.8);transition:all .3s}
.nav-logo{font-family:var(--font-mono);font-weight:700;font-size:1.05rem;color:var(--accent);letter-spacing:-0.02em}
.nav-logo span{color:var(--text);opacity:.7}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{font-family:var(--font-mono);font-size:0.78rem;color:var(--muted);letter-spacing:.08em;transition:color .2s;text-transform:uppercase}
.nav-links a:hover,.nav-links a.active{color:var(--accent)}
.nav-cta{font-family:var(--font-mono);font-size:0.78rem;font-weight:700;padding:8px 20px;border-radius:6px;background:var(--accent);color:#050a14;transition:all .25s;cursor:pointer;border:none}
.nav-cta:hover{background:#33ecff;box-shadow:0 0 24px rgba(0,229,255,.4);transform:translateY(-1px)}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:4px}
.hamburger span{width:22px;height:2px;background:var(--muted);border-radius:2px;transition:all .3s}
.mobile-menu{display:none;position:fixed;top:64px;left:0;right:0;background:rgba(5,10,20,.98);padding:24px 6%;border-bottom:1px solid var(--border);z-index:999;flex-direction:column;gap:0}
.mobile-menu a{font-family:var(--font-mono);font-size:.9rem;color:var(--muted);padding:14px 0;border-bottom:1px solid rgba(22,40,69,.5);display:block;text-transform:uppercase;letter-spacing:.08em;transition:color .2s}
.mobile-menu a:hover{color:var(--accent)}
.mobile-menu.open{display:flex}

/* LAYOUT */
section{padding:100px 6% 80px}
.label{font-family:var(--font-mono);font-size:.72rem;color:var(--accent);letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px}
.h2{font-family:var(--font-head);font-size:clamp(2rem,4vw,3rem);font-weight:800;line-height:1.1;margin-bottom:48px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 28px;border-radius:6px;font-family:var(--font-mono);font-size:.85rem;font-weight:700;cursor:pointer;transition:all .25s;border:none;text-decoration:none}
.btn-solid{background:var(--accent);color:#050a14}
.btn-solid:hover{background:#33ecff;box-shadow:0 0 24px rgba(0,229,255,.4);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent)}
.btn-ghost:hover{background:rgba(0,229,255,.08);transform:translateY(-2px)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:rgba(0,229,255,.25);box-shadow:0 0 32px rgba(0,229,255,.06)}

/* GRID BG */
.grid-bg{background-image:linear-gradient(rgba(22,40,69,.2) 1px,transparent 1px),linear-gradient(90deg,rgba(22,40,69,.2) 1px,transparent 1px);background-size:44px 44px}
.dot-bg{background-image:radial-gradient(circle,rgba(0,229,255,.07) 1px,transparent 1px);background-size:26px 26px}

/* PILLS */
.pill{display:inline-block;background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.18);color:var(--accent);font-family:var(--font-mono);font-size:.7rem;padding:4px 11px;border-radius:20px;margin:3px;transition:background .2s}
.pill:hover{background:rgba(0,229,255,.15)}
.tech-pill{background:rgba(139,92,246,.1);border:1px solid rgba(139,92,246,.25);color:#a78bfa;font-family:var(--font-mono);font-size:.7rem;padding:4px 10px;border-radius:4px;margin:3px;display:inline-block}

/* PROGRESS */
.prog-track{background:rgba(255,255,255,.06);border-radius:4px;height:5px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;transition:width 1.5s cubic-bezier(.4,0,.2,1)}

/* TIMELINE */
.timeline{position:relative;padding-left:0}
.tl-line{position:absolute;left:24px;top:8px;bottom:0;width:1px;background:linear-gradient(to bottom,var(--accent) 0%,rgba(0,229,255,.1) 80%,transparent 100%)}
.tl-item{position:relative;padding-left:64px;margin-bottom:40px}
.tl-dot{position:absolute;left:16px;top:12px;width:18px;height:18px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);box-shadow:0 0 14px rgba(0,229,255,.45);transition:box-shadow .3s}
.tl-item:hover .tl-dot{box-shadow:0 0 24px rgba(0,229,255,.7)}
.tl-item .card{border-left-width:3px}

/* CERT CARD */
.cert-item{background:var(--card2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:8px;padding:14px 18px;margin-bottom:12px;transition:transform .2s,border-color .2s}
.cert-item:hover{transform:translateX(5px);border-color:rgba(0,229,255,.5)}

/* CONTACT */
.contact-link{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--card2);border:1px solid var(--border);border-radius:10px;margin-bottom:12px;transition:all .25s;cursor:pointer}
.contact-link:hover{border-color:rgba(0,229,255,.3);background:rgba(0,229,255,.04);transform:translateX(4px)}
.contact-icon{width:40px;height:40px;border-radius:8px;background:rgba(0,229,255,.1);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}

/* IMPACT BADGE */
.impact{background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.18);border-radius:6px;padding:8px 14px;font-family:var(--font-mono);font-size:.8rem;color:var(--accent);margin-top:16px;display:inline-block}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,229,255,.4)}70%{box-shadow:0 0 0 8px rgba(0,229,255,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes orb{0%,100%{transform:scale(1) rotate(0deg)}50%{transform:scale(1.05) rotate(180deg)}}
@keyframes scanline{0%{top:-2px}100%{top:100%}}
@keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}

.fade-up{animation:fadeUp .8s ease forwards}
.blink{animation:blink 1.1s infinite}

/* ORBS */
.orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(1px)}

/* HERO NAME */
.hero-name{font-family:var(--font-head);font-size:clamp(3.5rem,8vw,7rem);font-weight:800;line-height:.95;letter-spacing:-.03em}
.hero-name .accent{color:var(--accent)}

/* SCROLLED state */
.scrolled{background:rgba(5,10,20,.97)!important}

/* MOBILE */
@media(max-width:768px){
  .nav-links,.nav-cta{display:none}
  .hamburger{display:flex}
  section{padding:80px 5% 60px}
  .hero-name{font-size:clamp(3rem,13vw,5rem)}
  .stats-row{grid-template-columns:1fr 1fr!important}
  .skills-grid{grid-template-columns:1fr!important}
  .proj-grid{grid-template-columns:1fr!important}
  .bottom-grid{grid-template-columns:1fr!important;gap:40px!important}
  .tl-line{left:12px}
  .tl-item{padding-left:44px}
  .tl-dot{left:4px}
}
@media(max-width:480px){
  .btn{padding:10px 20px;font-size:.8rem}
}
</style>

/* ── HOOKS ── */
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [inView, setInView] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setInView(true); }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, inView];
}

function useCounter(target, duration, active) {
  const [val, setVal] = useState(0);
  useEffect(() => {
    if (!active) return;
    let startTs = null;
    const step = (ts) => {
      if (!startTs) startTs = ts;
      const p = Math.min((ts - startTs) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(ease * target));
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [active, target, duration]);
  return val;
}

/* ── COMPONENTS ── */

function TypedText({ texts }) {
  const [display, setDisplay] = useState('');
  const [ti, setTi] = useState(0);
  const [phase, setPhase] = useState('typing');
  useEffect(() => {
    const cur = texts[ti];
    let t;
    if (phase === 'typing') {
      if (display.length < cur.length) t = setTimeout(() => setDisplay(cur.slice(0, display.length + 1)), 75);
      else t = setTimeout(() => setPhase('hold'), 1600);
    } else if (phase === 'hold') {
      t = setTimeout(() => setPhase('erase'), 400);
    } else {
      if (display.length > 0) t = setTimeout(() => setDisplay(display.slice(0, -1)), 38);
      else { setTi((ti + 1) % texts.length); setPhase('typing'); }
    }
    return () => clearTimeout(t);
  }, [display, phase, ti, texts]);
  return <span>{display}<span className="blink" style={{ color: '#00e5ff', marginLeft: 1 }}>|</span></span>;
}

function Counter({ target, suffix, active }) {
  const val = useCounter(target, 1800, active);
  return <>{val}{suffix}</>;
}

      <div style={{ position: 'absolute', bottom: '-10%', left: '-5%', width: 500, height: 500, borderRadius: '50%', background: 'radial-gradient(circle,rgba(139,92,246,.07) 0%,transparent 65%)', pointerEvents: 'none', animation: 'orb 22s ease-in-out infinite reverse' }} />

        {/* badge */}

          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 8, background: 'rgba(0,229,255,.07)', border: '1px solid rgba(0,229,255,.25)', borderRadius: 30, padding: '6px 16px', fontFamily: 'var(--font-mono)', fontSize: '.76rem', color: 'var(--accent)' }}>
            <span style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--accent)', display: 'inline-block', animation: 'pulse 2.2s infinite' }} />
            Open to opportunities · PAN India
          </span>

        <p style={{ ...fadeStyle(0.45), maxWidth: 600, color: '#8fa6be', lineHeight: 1.75, fontSize: '1.05rem', marginBottom: 36 }}>
          4+ years transforming raw data into strategic business intelligence.
          Specialist in <span style={{ color: 'var(--accent)' }}>Power BI</span>, <span style={{ color: 'var(--accent)' }}>SQL</span> & <span style={{ color: 'var(--accent)' }}>Python</span> — automating reports, engineering dashboards, and delivering measurable impact.

        {EXP.map((e, i) => (

            <div className="tl-dot" style={{ borderColor: e.color, boxShadow: `0 0 14px ${e.color}66` }} />

<script>
// Nav scroll behavior
const nav = document.getElementById('nav');
const links = document.querySelectorAll('.nav-links a');
window.addEventListener('scroll', () => {
  if (window.scrollY > 20) nav.classList.add('scrolled'); else nav.classList.remove('scrolled');
  const sections = ['home','skills','experience','projects','about','contact'];
  let current = 'home';
  sections.forEach(id => {
    const el = document.getElementById(id);
    if (el && window.scrollY >= el.offsetTop - 200) current = id;
  });
  links.forEach(a => {
    a.classList.toggle('active', a.getAttribute('href') === '#' + current);
  });
});

// Mobile menu
const hamburger = document.getElementById('hamburger');
const mobileMenu = document.getElementById('mobile-menu');
hamburger.addEventListener('click', () => {
  mobileMenu.classList.toggle('open');
  const spans = hamburger.querySelectorAll('span');
  if (mobileMenu.classList.contains('open')) {
    spans[0].style.transform = 'rotate(45deg) translate(5px,5px)';
    spans[1].style.opacity = '0';
    spans[2].style.transform = 'rotate(-45deg) translate(5px,-5px)';
  } else {
    spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
  }
});
function closeMobile() {
  mobileMenu.classList.remove('open');
  const spans = hamburger.querySelectorAll('span');
  spans.forEach(s => { s.style.transform = ''; s.style.opacity = ''; });
}

// Trigger skill bar animations on scroll
const progFills = document.querySelectorAll('.prog-fill');
const io = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.style.width = e.target.getAttribute('data-width') || e.target.style.width;
    }
  });
}, { threshold: 0.2 });
progFills.forEach(f => io.observe(f));
</script>
